##############################################################
# nginx.conf — Production Reverse Proxy + SSL
# Phase 10: Deploy
#
# Architecture:
#   Internet → Nginx:443 → Frontend:3000 (Next.js)
#                        → Backend:3001  (Express API)
#                        → /uploads/     (static files)
##############################################################

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent rt=$request_time '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # ── Performance ───────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 75;
    types_hash_max_size 2048;
    server_tokens   off;           # إخفاء إصدار Nginx من الـ headers
    client_max_body_size 26M;      # أكبر بقليل من MAX_FILE_SIZE_MB=25

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/rss+xml font/truetype font/opentype
        application/vnd.ms-fontobject image/svg+xml
        application/ld+json;       # JSON-LD schemas

    # ── Rate Limiting Zones ───────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m      rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;
    limit_req_zone $binary_remote_addr zone=search:10m   rate=30r/m;
    limit_req_zone $binary_remote_addr zone=conf_reg:1m  rate=5r/h;

    # ── SSL Session Cache (shared across workers) ─────────────
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Modern SSL Config ─────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Upstreams ─────────────────────────────────────────────
    upstream backend {
        server backend:3001;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # ── Server 1: HTTP → HTTPS Redirect ──────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name fa-arch.cu.edu.eg www.fa-arch.cu.edu.eg;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # كل حاجة تانية → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Server 2: HTTPS Production ────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name fa-arch.cu.edu.eg www.fa-arch.cu.edu.eg;

        # SSL Certificates (Let's Encrypt via Certbot)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # ── Security Headers ──────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "SAMEORIGIN"                                  always;
        add_header X-Content-Type-Options     "nosniff"                                     always;
        add_header X-XSS-Protection           "1; mode=block"                               always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"    always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self'; connect-src 'self' https://fa-arch.cu.edu.eg; frame-src https://www.google.com/recaptcha/; object-src 'none';" always;

        # ── API Routes → Backend ──────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Auth — stricter rate limiting
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Search — dedicated zone
        location /api/search {
            limit_req zone=search burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Conference registration — strictest
        location ~ ^/api/conferences/[^/]+/register$ {
            limit_req zone=conf_reg burst=2 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Static Uploads ────────────────────────────────────
        location /uploads/ {
            alias   /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;

            # منع تنفيذ الـ scripts
            location ~* \.(php|py|sh|pl|rb)$ {
                deny all;
            }
        }

        # ── Next.js Static Assets ─────────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend;
            expires    1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Frontend — كل الباقي ──────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
